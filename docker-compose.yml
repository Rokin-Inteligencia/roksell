version: "3.9"

services:
  backend:
    build: ./roksell-backend
    env_file:
      - ./roksell-backend/.env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build: ./roksell-frontend
    env_file:
      - ./roksell-frontend/.env
    ports:
      - "3000:3000"
    command: npm run start
    restart: unless-stopped

